<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简番茄钟</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:0.3s;background:#f8f8f8;color:#222}
        body.dark{background:#1a1a1a;color:#eee}
        .container{text-align:center}
        .time{font-size:6rem;margin:30px 0;font-weight:300}
        .btn-group{display:flex;gap:12px;flex-wrap:center;justify-content:center}
        button{border:none;padding:12px 24px;border-radius:8px;font-size:16px;cursor:pointer;background:#446ce8;color:#fff}
        button:nth-child(2){background:#27b969}
        button:nth-child(3){background:#e25353}
        .mode{position:absolute;top:20px;right:20px;background:#888;padding:8px 14px}
    </style>
</head>
<body>
    <button class="mode" id="toggleDark">切换深色</button>
    <div class="container">
        <div class="time" id="clock">25:00</div>
        <div class="btn-group">
            <button id="start">开始</button>
            <button id="pause">暂停</button>
            <button id="reset">重置</button>
            <button id="restBtn">休息(5min)</button>
        </div>
    </div>

    <script>
        // 基础配置
        let workMin = 25, restMin =5;
        let totalSec = workMin*60;
        let timer = null;
        const clock = document.getElementById('clock');
        const start=document.getElementById('start');
        const pause=document.getElementById('pause');
        const reset=document.getElementById('reset');
        const restBtn=document.getElementById('restBtn');
        const toggleDark=document.getElementById('toggleDark');

        // 格式化时分
        function format(s){
            let m = Math.floor(s/60);
            let s2 = s%60;
            return `${String(m).padStart(2,'0')}:${String(s2).padStart(2,'0')}`
        }
        clock.innerText = format(totalSec);

        // 倒计时
        start.onclick=()=>{
            clearInterval(timer);
            timer = setInterval(()=>{
                if(totalSec<=0){
                    clearInterval(timer);
                    new Audio('https://assets.mixkit.co/sfx/preview/mixkit-alarm-digital-clock-beep-989.mp3').play();
                    return;
                }
                totalSec--;
                clock.innerText=format(totalSec);
            },1000)
        }
        pause.onclick=()=>clearInterval(timer);
        reset.onclick=()=>{
            clearInterval(timer);
            totalSec=workMin*60;
            clock.innerText=format(totalSec);
        }
        restBtn.onclick=()=>{
            clearInterval(timer);
            totalSec=restMin*60;
            clock.innerText=format(totalSec);
        }
        // 深色模式
        toggleDark.onclick=()=>document.body.classList.toggle('dark')
    </script>
</body>
</html>
